name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maubot CLI
        run: pip install maubot

      - name: Verify plugin builds
        run: mbc build

      - name: Read plugin metadata
        id: meta
        run: |
          id=$(grep -E '^id:' maubot.yaml | awk '{print $2}')
          version=$(grep -E '^version:' maubot.yaml | awk '{print $2}')
          echo "file=${id}-v${version}.mbp" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.file }}
          path: ${{ steps.meta.outputs.file }}
          if-no-files-found: error

      - name: Attach plugin to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.file }}
